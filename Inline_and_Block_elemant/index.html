<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Inline & Block</title>
</head>

<body>
    <p>This is a paragraph, which is a block element.</p>

    <a href="#">This is a link, which is an inline element.</a>

    <span>This is a span, which is also an inline element.</span>

    <div>This is a div, which is a block element.</div>

</body>

</html>
